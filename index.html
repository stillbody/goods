<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stillbody</title>
    <style>
       body {
    /* 1. フォント指定：日本語も英語も「細身のサンセリフ」に統一 */
    font-family: "Inter", "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    
    /* 2. ウェイト：とにかく細く（プロのデザインはここが肝） */
    font-weight: 200;
    
    /* 3. カーニング：10%〜20%ほど広げて「余白」を文字の中にも作る */
    letter-spacing: 0.15em;
    
    /* 4. アンチエイリアス：フォントをよりシャープに見せる（デザイナー必須） */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    
    color: #FFFFFF;
    background-color: #000000;
}

/* リンク（mat / cushion）の装飾 */
a {
    font-size: 12px;
    text-decoration: none;
    color: #FFFFFF;
    border-bottom: 0.5px solid #333333; /* 1pxだと太いので0.5pxや薄いグレーで */
    padding-bottom: 2px;
    transition: opacity 0.3s ease;
}

a:hover {
    opacity: 0.6;
}
        /* 上部の一言 */
        header {
            margin-top: 15vh; /* 画面上部から15%の余白 */
            margin-bottom: 5vh;
            font-size: 13px;
            letter-spacing: 0.2em;
            color: #aaaaaa;
        }
        /* メイン画像 */
        .main-img {
            width: 100%;
            max-width: 450px;
            height: auto;
            margin-bottom: 12vh; /* 画像下の広大な余白 */
        }
        /* リンク */
        .links {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: flex-start;
            width: 100%;
            max-width: 450px;
            padding-left: 20px;
        }
        .links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #333333; /* 目立たない下線 */
            padding-bottom: 3px;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <header>これくらいでいい</header>
    
    <img src="top.jpg" class="main-img">

    <nav class="links">
        <a href="AmazonなどのURL">mat</a>
        <a href="AmazonなどのURL">cushion</a>
    </nav>
</body>
</html>
