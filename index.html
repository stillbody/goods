<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stillbody</title>
    <style>
        body {
            background-color: #000000; /* 真っ黒 */
            color: #ffffff;
            font-family: "Helvetica Neue", Arial, "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
       
        header {
            margin-top: 15vh; 
            margin-bottom: 5vh;
            font-size: 13px;
            letter-spacing: 0.2em;
            color: #aaaaaa;
        }
        
        .main-img {
            width: 100%;
            max-width: 450px;
            height: auto;
            margin-bottom: 12vh; /* 画像下の広大な余白 */
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: flex-start;
            width: 100%;
            max-width: 450px;
            padding-left: 20px;
        }
        .links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #333333; /* 目立たない下線 */
            padding-bottom: 3px;
            letter-spacing: 0.1em;
        }
		nav{
			margin-bottom: 5vh;
		}
    </style>
</head>
<body>
    <header>これくらいでいい</header>
    
    <img src="top.jpg" class="main-img">

    <nav class="links">
        <a href="AmazonなどのURL">mat</a>
        <a href="AmazonなどのURL">cushion</a>
    </nav>
</body>
</html>
